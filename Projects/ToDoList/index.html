<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <title>Todo-List</title>
  </head>
  <body>

    <nav class="navbar bg-body-tertiary fixed-top">
      <div class="container-fluid">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNavbar"
          aria-controls="offcanvasNavbar"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </nav>

    <div
      class="offcanvas offcanvas-start show"
      tabindex="-1"
      id="offcanvasNavbar"
      aria-labelledby="offcanvasNavbarLabel"
    >
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>

    </div>

    <!-- Search Bar -->
    <form class="d-flex mt-3 formclass" role="search">
        <input
          class="form-control me-2"
          type="search"
          placeholder="Search"
          aria-label="Search"
        />
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>

     

      <!-- Task List -->
      <div class="offcanvas-body">
        <ul class="navbar-nav">
            <li class="d-flex justify-content-between align-items-center list-items">
                TASKS
              </li>
            <ul class="list-group">
                <li class="d-flex justify-content-between align-items-center list-items">
                    <img class="today" src="./Assets/calendar_icon.png" alt="">
                    <span class="task-lists">Upcoming</span>
                  <span class="badge text-bg-primary rounded-pill ">14</span>
                </li>
                
                <li class="d-flex justify-content-between align-items-center list-items">
                    <img class="today" src="./Assets/checklist_icon.png" alt="">
                    <span class="task-lists">Today</span>
                  <span class="badge text-bg-primary rounded-pill ">2</span>
                </li>
                <li class="d-flex justify-content-between align-items-center list-items">
                    <img class="today" src="./Assets/post-it_icon.png" alt="">
                    <span class="task-lists">Sticky Wall</span>
                  <span class="badge text-bg-primary rounded-pill">1</span>
                </li>
              </ul>
          </li>
        </ul>
       
      </div>


      <div class="offcanvas-body">
        <ul class="navbar-nav">
            <li class="d-flex justify-content-between align-items-center list-items">
                LISTS
              </li>
            <ul class="list-group">
                <li class="d-flex justify-content-between align-items-center list-items">
                    <img class="today" src="./Assets/calendar_icon.png" alt="">
                    <span class="task-lists">Personal</span>
                  <span class="badge text-bg-primary rounded-pill ">14</span>
                </li>
                
                <li class="d-flex justify-content-between align-items-center list-items">
                    <img class="today" src="./Assets/checklist_icon.png" alt="">
                    <span class="task-lists">Work</span>
                  <span class="badge text-bg-primary rounded-pill ">2</span>
                </li>
                <li class="d-flex justify-content-between align-items-center list-items">
                    <img class="today" src="./Assets/post-it_icon.png" alt="">
                    <span class="task-lists"> Free</span>
                  <span class="badge text-bg-primary rounded-pill">1</span>
                </li>
                <div class="input-group mb-3 mt-2 addNew">
                    <button class="btn btn-outline-secondary" type="button" id="button-addon1">+</button>
                    <input type="text" class="form-control" placeholder="Add New List" aria-label="Example text with button addon" aria-describedby="button-addon1">
                  </div>
            </ul>
        </li>
    </ul>
    
       
        
      </div>
     
      <div class="bottom-bar">
        <img class="auth-img" src="./Assets/auth_icon.png" alt="auth">
        <button  type="button" class="btn btn-success login-button" onclick="goToLoginPage()">Success</button>
      </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
