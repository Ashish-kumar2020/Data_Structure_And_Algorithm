<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Stopwatch</title>
  </head>
  <body>
    <div class="main-container">
      <h1>Stopwatch</h1>
      <div class="stopwatch">
        <div class="displayTime">
          <span class="hour"></span>: <span class="minute"></span>:
          <span class="seconds"></span>
        </div>
      </div>
    </div>
    <div class="StartBtnDiv">
      <button class="startBtn" onclick="startTimer()">Start</button>
    </div>
    <div class="StopBtnDiv">
      <button class="stopBtn" onclick="stopTimer()">Stop</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
